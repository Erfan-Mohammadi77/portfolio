    <!--
      GitHub Pages SPA redirect trick.
      GitHub Pages has no server-side rewrites, so a direct visit/refresh on
      a nested route (e.g. /en/about) returns a real 404. 404.html stores the
      requested path and bounces to /, then this script restores it so
      React Router can take over client-side.
      https://github.com/rafgraph/spa-github-pages
    -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
